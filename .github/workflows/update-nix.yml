name: Update Nix Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (defaults to kopuz/Cargo.toml)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V=$(awk -F'"' '/^version/{print $2; exit}' kopuz/Cargo.toml)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Bump version in package.nix
        run: |
          sed -i 's/version = "[^"]*";/version = "${{ steps.ver.outputs.version }}";/' nix/package.nix

      - name: Compute src hash
        run: |
          PREFETCH=$(nix run nixpkgs#nix-prefetch-github -- temidaradev kopuz --rev "v${{ steps.ver.outputs.version }}")
          NEW_HASH=$(echo "$PREFETCH" | nix run nixpkgs#jq -- -r .hash)
          if [ -z "$NEW_HASH" ] || [ "$NEW_HASH" = "null" ]; then
            echo "Failed to compute src hash"; echo "$PREFETCH"; exit 1
          fi
          ESCAPED=$(printf '%s\n' "$NEW_HASH" | sed -e 's/[\/&]/\\&/g')
          sed -i "0,/hash = \"sha256-[^\"]*\";/{s|hash = \"sha256-[^\"]*\";|hash = \"$ESCAPED\";|}" nix/package.nix

      - name: Compute cargoHash
        run: |
          sed -i 's|cargoHash = "sha256-[^"]*";|cargoHash = "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=";|' nix/package.nix
          set +e
          BUILD_OUT=$(nix build --no-link --print-build-logs -E '
            with import <nixpkgs> {};
            callPackage ./nix/package.nix {}
          ' 2>&1)
          set -e
          echo "$BUILD_OUT" | tail -60
          GOT=$(echo "$BUILD_OUT" | grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' | head -1 | awk '{print $2}')
          if [ -z "$GOT" ]; then
            echo "Failed to extract cargoHash from build output"
            exit 1
          fi
          ESCAPED=$(printf '%s\n' "$GOT" | sed -e 's/[\/&]/\\&/g')
          sed -i "s|cargoHash = \"sha256-[^\"]*\";|cargoHash = \"$ESCAPED\";|" nix/package.nix

      - name: Diff
        run: git --no-pager diff nix/package.nix

      - uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(nix): update package to v${{ steps.ver.outputs.version }}'
          body: |
            Auto-update from `update-nix.yml`.

            - Bumped `version` in `nix/package.nix` to `${{ steps.ver.outputs.version }}`
            - Refreshed `hash` (src) and `cargoHash`
          branch: nix-auto-update
          base: master
          commit-message: 'chore(nix): bump to v${{ steps.ver.outputs.version }}'
          delete-branch: true
